<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>invite from suppawet 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #cceeff;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  overflow: hidden;
}

h1 {
  color: #0077cc;
  margin-bottom: 10px;
}

img {
  width: 220px;
  border-radius: 15px;
  margin: 15px 0;
}

.buttons {
  position: relative;
  width: 300px;
  height: 200px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
}

#yesBtn {
  background: #28a745;
  color: white;
  left: 20%;
  top: 50%;
}

#noBtn {
  background: #dc3545;
  color: white;
  left: 55%;
  top: 50%;
}

#result {
  margin-top: 10px;
  font-size: 24px;
  color: #0077cc;
  font-weight: bold;
}
</style>
</head>

<body>

<h1 id="question">
  You are invited to watch a movie with <br>
  <b>Namo Suppawet</b> <br>
  tonight at 8 PM 🎬
</h1>

<img id="mainImage" src="your-image.jpg">

<div class="buttons">
  <button id="yesBtn" onclick="sayYes()">Yes 💙</button>
  <button id="noBtn">No 😭</button>
</div>

<div id="result"></div>

<audio id="loveSound" src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3"></audio>
<audio id="scubaSound" src="scuba.mp3"></audio>

<script>
let yesSize = 1;
let noClickCount = 0;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

// 🔥 ฟังก์ชันสุ่มตำแหน่ง
function moveNoButton() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 100);

  noBtn.style.position = "fixed";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// 🏃‍♂️ หนีตลอด
noBtn.addEventListener("mouseover", moveNoButton);
noBtn.addEventListener("mousemove", moveNoButton);

// ❌ กด No
noBtn.addEventListener("click", () => {
  moveNoButton();

  noClickCount++;

  const messages = [
    "Really? 🥺",
    "Think again 😭",
    "Come watch with me...",
    "I really want to watch with you 😢",
    "One more chance? 💔",
    "Pleaseeee 🥺💙"
  ];

  document.getElementById("question").innerText =
    messages[Math.min(noClickCount, messages.length - 1)];

  yesSize += 0.3;
  yesBtn.style.transform = `scale(${yesSize})`;
});

// ✅ กด Yes
function sayYes() {
  document.getElementById("result").innerText =
    "yeyyy see you tonight mahal ko 💙😆🎬";

  document.getElementById("loveSound").play();
  document.getElementById("scubaSound").play();

  // 🐱 แมวเต้นจากเน็ต
  document.getElementById("mainImage").src =
    "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif";

  for (let i = 0; i < 20; i++) {
    createHeart();
  }
}

// 💙 หัวใจลอย
function createHeart() {
  const heart = document.createElement("div");
  heart.innerText = "💙";
  heart.style.position = "fixed";
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";
  heart.style.fontSize = "24px";
  heart.style.animation = "floatUp 2s linear";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 2000);
}

// animation
const style = document.createElement("style");
style.innerHTML = `
@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-300px); opacity: 0; }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
